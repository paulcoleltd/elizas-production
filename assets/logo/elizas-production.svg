<svg viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Elizas Production">

  <!-- ══════════════════════════════════════════
       MARK — Geometric E reconstructed from
       4 film-strip bars with a diagonal slash
       ══════════════════════════════════════════ -->

  <!-- Left spine of the E -->
  <rect x="0" y="0" width="4.5" height="40" fill="white"/>

  <!-- Film bar 1 (top) — full width -->
  <rect x="4.5" y="0"  width="20" height="7.5" fill="white"/>

  <!-- Film bar 2 — 3/4 width (upper mid) -->
  <rect x="4.5" y="11" width="13" height="6"   fill="white"/>

  <!-- Film bar 3 — 4/5 width (lower mid) -->
  <rect x="4.5" y="21" width="16" height="6"   fill="white"/>

  <!-- Film bar 4 (bottom) — full width -->
  <rect x="4.5" y="32.5" width="20" height="7.5" fill="white"/>

  <!-- Diagonal slash — clapperboard / cut / motion
       Runs top-right to lower-right of the mark, ~20° tilt.
       Rendered as a clipped dark wedge removing the corner
       of bar 1, plus a standalone thin white slash line -->

  <!-- Dark triangle cutting top-right corner of bar 1 (depth) -->
  <polygon points="19,0 24.5,0 24.5,7.5" fill="#111111"/>

  <!-- White diagonal slash line continuing the cut downward -->
  <line x1="21.5" y1="9"
        x2="27"   y2="31"
        stroke="white"
        stroke-width="1.8"
        stroke-linecap="square"/>

  <!-- ══════════════════════════════════════════
       DIVIDER
       ══════════════════════════════════════════ -->
  <rect x="36" y="6" width="0.6" height="28" fill="rgba(255,255,255,0.18)"/>

  <!-- ══════════════════════════════════════════
       WORDMARK
       elizas  (light, generously tracked)
       PRODUCTION  (medium, tight, dimmed)
       ══════════════════════════════════════════ -->

  <!-- elizas -->
  <text x="44" y="20"
    font-family="'Space Grotesk', Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="300"
    letter-spacing="4"
    fill="white">elizas</text>

  <!-- PRODUCTION -->
  <text x="45" y="33"
    font-family="'Space Grotesk', Helvetica, Arial, sans-serif"
    font-size="8.5"
    font-weight="500"
    letter-spacing="3.5"
    fill="rgba(255,255,255,0.55)">PRODUCTION</text>

</svg>
